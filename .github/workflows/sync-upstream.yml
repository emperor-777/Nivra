name: Sync Upstream Signal

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Nivra
        uses: actions/checkout@v4
        with:
          ref: nivra-main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "Nivra Auto-Sync"
          git config user.email "bot@nivra.local"

      - name: Add Upstream Remote
        run: |
          git remote get-url upstream || git remote add upstream https://github.com/signalapp/Signal-Android.git

      - name: Fetch Upstream
        run: |
          git fetch upstream main

      - name: Check for Protected Path Changes
        id: check_paths
        run: |
          git diff --name-only HEAD upstream/main > changed_files.txt
          PROTECTED_PATHS="crypto/ dependencies/ jobs/ messages/ net/ push/ registration/ webrtc/ whispersystems/ libsignal/"
          PROTECTED_TOUCHED=false
          for path in $PROTECTED_PATHS; do
            if grep -q "$path" changed_files.txt; then
              echo "Protected path touched: $path"
              PROTECTED_TOUCHED=true
            fi
          done
          echo "protected_touched=$PROTECTED_TOUCHED" >> $GITHUB_OUTPUT

      - name: Create Sync PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync upstream Signal-Android"
          title: "Sync Upstream Updates"
          body: "Automated PR to sync with upstream. Protected paths touched: ${{ steps.check_paths.outputs.protected_touched }}"
          branch: "sync/upstream-latest"
          base: "nivra-main"
          labels: "upstream-sync"

  build-release:
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - name: Checkout Nivra
        uses: actions/checkout@v4
        with:
          ref: nivra-main

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleNivraProdRelease --no-daemon

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nivra-Release-APK
          path: app/build/outputs/apk/nivraProd/release/*.apk

      - name: Publish to GitHub Releases
        if: github.ref == 'refs/heads/nivra-main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Nivra Latest Build
          files: app/build/outputs/apk/nivraProd/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OTA latest.json
        if: github.ref == 'refs/heads/nivra-main'
        run: |
          mkdir -p public
          APK_PATH=$(ls app/build/outputs/apk/nivraProd/release/*.apk)
          APK_NAME=$(basename $APK_PATH)
          SHA256=$(sha256sum $APK_PATH | awk '{print $1}')
          TIMESTAMP=$(date +%s)
          VERSION_CODE=$((TIMESTAMP / 10))
          
          echo "{\"versionCode\": $VERSION_CODE, \"versionName\": \"Nivra Latest\", \"sha256sum\": \"$SHA256\", \"url\": \"https://github.com/emperor-777/Nivra/releases/download/latest/$APK_NAME\", \"uploadTimestamp\": $TIMESTAMP}" > public/latest.json

      - name: Deploy OTA Manifest to GitHub Pages
        if: github.ref == 'refs/heads/nivra-main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true