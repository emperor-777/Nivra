name: Sync and Build Nivra

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - nivra-main

permissions:
  contents: write
  pages: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
    steps:
      - name: Checkout Nivra
        uses: actions/checkout@v4
        with:
          ref: nivra-main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "Nivra Auto-Sync"
          git config user.email "bot@nivra.local"

      - name: Add Upstream Remote
        run: |
          git remote get-url upstream 2>/dev/null || git remote add upstream https://github.com/signalapp/Signal-Android.git

      - name: Fetch Upstream
        run: git fetch upstream main

      - name: Check for Changes
        id: check_changes
        run: |
          DIFF_COUNT=$(git rev-list --count HEAD..upstream/main)
          if [ "$DIFF_COUNT" -gt "0" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Found $DIFF_COUNT new upstream commits"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new upstream commits"
          fi

      - name: Check for Protected Path Changes
        if: steps.check_changes.outputs.has_changes == 'true'
        id: check_paths
        run: |
          git diff --name-only HEAD upstream/main > changed_files.txt
          PROTECTED_PATHS="crypto/ dependencies/ jobs/ messages/ net/ push/ registration/ webrtc/ whispersystems/ libsignal/"
          PROTECTED_TOUCHED=false
          for path in $PROTECTED_PATHS; do
            if grep -q "$path" changed_files.txt; then
              echo "Protected path touched: $path"
              PROTECTED_TOUCHED=true
            fi
          done
          echo "protected_touched=$PROTECTED_TOUCHED" >> $GITHUB_OUTPUT

      - name: Merge Upstream (Non-Protected Only)
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git merge upstream/main --no-edit || echo "Merge conflict detected. Manual resolution required."
          git push origin nivra-main || echo "Push failed, may need manual intervention."

  build-release:
    runs-on: ubuntu-latest
    needs: sync
    if: always()
    steps:
      - name: Checkout Nivra
        uses: actions/checkout@v4
        with:
          ref: nivra-main
          fetch-depth: 0

      - name: Allocate Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Build Nivra APK
        run: |
          ./gradlew clean assembleNivraProdDebug \
            --no-daemon \
            --stacktrace \
            --info \
            -Dorg.gradle.jvmargs="-Xmx6g -Xms1g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError" \
            -Dkotlin.daemon.jvm.options="-Xmx3g -Xms512m"
        env:
          GRADLE_OPTS: '-Xmx6g -Xms1g -XX:MaxMetaspaceSize=1g'

      - name: Get Version Info
        id: version
        run: |
          APK_PATH=$(find app/build/outputs/apk/nivraProd/debug/ -name "*.apk" | head -1)
          APK_NAME=$(basename "$APK_PATH")
          SHA256=$(sha256sum "$APK_PATH" | awk '{print $1}')
          TIMESTAMP=$(date +%s)000
          DATE_TAG=$(date +%Y%m%d-%H%M)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "date_tag=$DATE_TAG" >> $GITHUB_OUTPUT

      - name: Delete Old Release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create latest \
            "${{ steps.version.outputs.apk_path }}" \
            --title "Nivra ${{ steps.version.outputs.date_tag }}" \
            --notes "Automated Nivra build from ${{ steps.version.outputs.date_tag }}" \
            --target nivra-main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OTA latest.json
        run: |
          mkdir -p public
          cat > public/latest.json << EOF
          {
            "versionCode": $((${{ github.run_number }} + 20000)),
            "versionName": "Nivra ${{ steps.version.outputs.date_tag }}",
            "sha256sum": "${{ steps.version.outputs.sha256 }}",
            "url": "https://github.com/emperor-777/Nivra/releases/download/latest/${{ steps.version.outputs.apk_name }}",
            "uploadTimestamp": ${{ steps.version.outputs.timestamp }}
          }
          EOF
          cat public/latest.json

      - name: Deploy OTA Manifest to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true